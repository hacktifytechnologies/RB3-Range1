id: DEEPSTRIKE-EXT01-M5-WKHTMLTOPDF-SSRF
name: DEEPSTRIKE-Setup-M5-WkhtmltopdfFileSSRF
description: >
  Participant targets the RPAL Contractor Onboarding Portal which passes the user-supplied
  company_profile_url field directly to wkhtmltopdf 0.12.5 with the --enable-local-file-access
  flag set. Submitting file:///etc/rpal/upstream/config.ini as the profile URL causes the server
  to read the file and embed its contents as a second page in the generated PDF. The config file
  contains the RSA-2048 SSH private key and passphrase for svc-deploy access to Range 2 as well
  as LDAP bind credentials, completing the pivot chain to RNG-EXT-02.
tactic: credential-access
technique_id: T1552.001
technique_name: Unsecured Credentials
sub_technique: "Credentials In Files"
tag: "range"
executors:
  - name: sh
    platform: linux
    command: chmod +x /opt/rpal/contractor-portal/app/app.py && chown -R rpal-contractor:rpal-contractor /opt/rpal/contractor-portal && chmod 640 /etc/rpal/upstream/config.ini && chown root:rpal-contractor /etc/rpal/upstream/config.ini && systemctl enable rpal-contractor-portal --now
    payloads: []
    parsers: []
