id: DEEPSTRIKE-EXT01-M5-GIT-EXPOSURE
name: DEEPSTRIKE-Setup-M5-ExposedGitDirectoryCredentialExtraction
description: >
  Participant uses the API key from M4 to access the RPAL Contractor Registration
  System. The application was deployed directly from a git working directory with
  express.static configured using dotfiles allow, exposing the entire .git directory
  tree over HTTP. Fetching the git commit history reveals an initial commit where
  the admin token was hardcoded in source code before being moved to an environment
  variable. Using the recovered token against the admin export endpoint retrieves
  the Range 2 SSH pivot credentials for svc-deploy access to RNG-EXT-02.
tactic: credential-access
technique_id: T1552.001
technique_name: Unsecured Credentials
sub_technique: "Credentials In Files"
tag: "range"
executors:
  - name: sh
    platform: linux
    command: chmod -R 755 /opt/rpal/contractor-portal/app/.git && chown -R rpal-contractor:rpal-contractor /opt/rpal/contractor-portal && chmod 600 /etc/rpal/keys/svc-deploy-rsa && chown root:rpal-contractor /etc/rpal/keys/svc-deploy-rsa && systemctl enable rpal-contractor-portal --now
    payloads: []
    parsers: []
