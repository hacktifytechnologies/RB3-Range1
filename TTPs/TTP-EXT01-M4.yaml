id: DEEPSTRIKE-EXT01-M4-EJS-SSTI
name: DEEPSTRIKE-Setup-M4-EJSServerSideTemplateInjection
description: >
  Participant authenticates to the RPAL Geological Survey Analytics Portal using
  IMDS IAM role credentials extracted from the cloud metadata service in M3.
  The report generator accepts a user-supplied EJS template string and passes it
  directly to ejs.render() without sanitisation, allowing arbitrary JavaScript
  execution in the Node.js process context. Exploiting this with a child_process
  execSync payload reads the M5 contractor API key from the filesystem, completing
  the credential chain to the Contractor Registration System.
tactic: execution
technique_id: T1059
technique_name: Command and Scripting Interpreter
sub_technique: "None"
tag: "range"
executors:
  - name: sh
    platform: linux
    command: chmod +x /opt/rpal/survey-portal/app/app.js && chown -R rpal-survey:rpal-survey /opt/rpal/survey-portal && chmod 640 /etc/rpal/contractor/api-key.txt && chown root:rpal-survey /etc/rpal/contractor/api-key.txt && systemctl enable rpal-survey-portal --now
    payloads: []
    parsers: []
