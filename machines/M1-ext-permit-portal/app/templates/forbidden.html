<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Access Denied — RPAL Permit Portal</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e8edf5;font-family:-apple-system,sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center}
.card{background:#0f1e38;border:1px solid rgba(220,38,38,.3);border-radius:10px;padding:48px;
  max-width:480px;text-align:center}
.icon{font-size:40px;margin-bottom:16px}
.title{font-size:20px;font-weight:700;color:#f87171;margin-bottom:8px}
.msg{font-size:14px;color:#94a3b8;margin-bottom:8px;line-height:1.5}
.user{font-family:monospace;font-size:12px;color:#64748b;margin-bottom:28px}
.btn{background:#1a56c4;color:#fff;padding:11px 24px;border-radius:7px;
  text-decoration:none;font-size:13px;font-weight:600}
</style></head><body>
<div class="card"><div class="icon">🔒</div>
<div class="title">Access Denied</div>
<div class="msg">You do not have permission to access this resource.</div>
<div class="user">User: {{ claims.sub }} · Role: {{ claims.role }}</div>
<a class="btn" href="/dashboard">Return to Dashboard</a></div></body></html>
