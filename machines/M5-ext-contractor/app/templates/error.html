<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Error — RPAL</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a1628;color:#e8edf5;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0f1e38;border:1px solid #1e3a5f;border-radius:10px;padding:48px;max-width:420px;text-align:center}
.icon{font-size:36px;margin-bottom:14px}.title{font-size:18px;font-weight:700;margin-bottom:8px}
.msg{font-size:13px;color:#94a3b8;margin-bottom:24px}
.btn{background:#1a56c4;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600}
</style></head><body><div class="card"><div class="icon">⚠</div>
<div class="title">Error</div><div class="msg">{{ message }}</div>
<a class="btn" href="/">Return to Portal</a></div></body></html>
